name: Sync weight data from D1

on:
  schedule:
    - cron: '0 * * * *'  # 毎時0分
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Get last synced datetime
      id: last_date
      run: |
        if [ -f data.jsonl ]; then
          # フルタイムスタンプで比較（日付だけだと同日データを繰り返し取得する）
          last=$(tail -1 data.jsonl | jq -r '.datetime')
          echo "datetime=${last}" >> "$GITHUB_OUTPUT"
        else
          echo "datetime=2024-03-19 00:00:00" >> "$GITHUB_OUTPUT"
        fi

    - name: Fetch new data from D1
      id: fetch
      run: |
        response=$(curl -sf -X POST \
          "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/d1/database/${{ secrets.D1_DATABASE_ID }}/query" \
          -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d "{\"sql\": \"SELECT measured_at, weight, fat_mass, fat_ratio, fat_free_mass, muscle_mass, hydration, bone_mass, visceral_fat, basal_metabolic_rate, metabolic_age FROM weight_measurements WHERE measured_at > ? ORDER BY measured_at ASC\", \"params\": [\"${{ steps.last_date.outputs.datetime }}\"]}")

        count=$(echo "$response" | jq '.result[0].results | length')
        echo "count=${count}" >> "$GITHUB_OUTPUT"

        if [ "$count" -gt 0 ]; then
          echo "$response" | jq -c '.result[0].results[] | {
            "datetime": .measured_at,
            "weight": .weight,
            "fat": .fat_mass,
            "fat_ratio": .fat_ratio,
            "fat_free_mass": .fat_free_mass,
            "muscle_mass": .muscle_mass,
            "hydration": .hydration,
            "bone_mass": .bone_mass,
            "visceral_fat": .visceral_fat,
            "basal_metabolic_rate": .basal_metabolic_rate,
            "metabolic_age": .metabolic_age
          }' >> data.jsonl

          # 最新データを取得（通知用）
          latest_weight=$(echo "$response" | jq -r '.result[0].results[-1].weight')
          latest_fat_ratio=$(echo "$response" | jq -r '.result[0].results[-1].fat_ratio')
          latest_muscle=$(echo "$response" | jq -r '.result[0].results[-1].muscle_mass')
          echo "latest_weight=${latest_weight}" >> "$GITHUB_OUTPUT"
          echo "latest_fat_ratio=${latest_fat_ratio}" >> "$GITHUB_OUTPUT"
          echo "latest_muscle=${latest_muscle}" >> "$GITHUB_OUTPUT"
        fi

    - name: Commit and push
      if: steps.fetch.outputs.count != '0'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data.jsonl
        datetime=$(date '+%F %T')
        git commit -m "Sync weight data from D1 on ${datetime}"
        git push
      env:
        TZ: Asia/Tokyo

    - name: Post on Pixela
      if: steps.fetch.outputs.count != '0'
      run: |
        date=$(date '+%Y%m%d')
        curl -X POST https://pixe.la/v1/users/yasuharu519/graphs/weight \
          -H "X-USER-TOKEN:${{ secrets.PIXELA_TOKEN }}" \
          -d "{\"date\":\"${date}\",\"quantity\":\"${{ steps.fetch.outputs.latest_weight }}\"}"
      env:
        TZ: Asia/Tokyo

    - name: Slack Notification
      if: steps.fetch.outputs.count != '0'
      uses: tokorom/action-slack-incoming-webhook@d57bf1eb618f3dae9509afefa70d5774ad3d42bf # v1.3.0
      env:
        INCOMING_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      with:
        text: Weight synced from D1!
        attachments: |
          [
            {
              "color": "good",
              "fields": [
                {
                  "title": "体重",
                  "value": "${{ steps.fetch.outputs.latest_weight }} kg"
                },
                {
                  "title": "体脂肪率",
                  "value": "${{ steps.fetch.outputs.latest_fat_ratio }} %"
                },
                {
                  "title": "筋肉量",
                  "value": "${{ steps.fetch.outputs.latest_muscle }} kg"
                }
              ]
            }
          ]

name: Sync weight data from D1

on:
  schedule:
    - cron: '0 * * * *'  # 毎時0分
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Get last synced date
      id: last_date
      run: |
        if [ -f data.jsonl ]; then
          last=$(tail -1 data.jsonl | jq -r '.datetime' | cut -d' ' -f1)
          echo "date=${last}" >> "$GITHUB_OUTPUT"
        else
          echo "date=2024-03-19" >> "$GITHUB_OUTPUT"
        fi

    - name: Fetch new data from D1
      id: fetch
      run: |
        response=$(curl -sf -X POST \
          "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/d1/database/${{ secrets.D1_DATABASE_ID }}/query" \
          -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d "{\"sql\": \"SELECT measured_at, weight, fat_mass FROM weight_measurements WHERE measured_at > ? ORDER BY measured_at ASC\", \"params\": [\"${{ steps.last_date.outputs.date }}\"]}")

        count=$(echo "$response" | jq '.result[0].results | length')
        echo "count=${count}" >> "$GITHUB_OUTPUT"

        if [ "$count" -gt 0 ]; then
          echo "$response" | jq -c '.result[0].results[] | {"datetime": .measured_at, "weight": .weight, "fat": .fat_mass}' >> data.jsonl
        fi

    - name: Commit and push
      if: steps.fetch.outputs.count != '0'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data.jsonl
        datetime=$(date '+%F %T')
        git commit -m "Sync weight data from D1 on ${datetime}"
        git push
      env:
        TZ: Asia/Tokyo

name: update metrics
on:
  workflow_dispatch:
    inputs:
      weight:
        description: 'Weight metrics on kilogram'
        required: true
      fat:
        description: 'Fat metrics on kilogram'
        required: false
        default: null
jobs:
  update_metrics:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        persist-credentials: false
        fetch-depth: 0
    - name: Update jsonl
      run: |
        datetime=`date '+%F %T'`
        fat=${{ github.event.inputs.fat }}
        if [ -z $fat ]; then fat=null ; fi
        echo "{\"datetime\": \"${datetime}\", \"weight\": ${{ github.event.inputs.weight }}, \"fat\": ${fat}}" >> data.jsonl
        # git commit
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git commit -m "Update metrics on ${datetime}"
      env:
        TZ: Asia/Tokyo
    - name: Push changes
      uses: ad-m/github-push-action@77c5b412c50b723d2a4fbc6d71fb5723bcd439aa # v1.0.0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
    - name: Slack Notification on SUCCESS
      if: success()
      uses: tokorom/action-slack-incoming-webhook@d57bf1eb618f3dae9509afefa70d5774ad3d42bf # v1.3.0
      env:
        INCOMING_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      with:
        text: Weight updated!
        attachments: |
          [
            {
              "color": "good",
              "author_name": "${{ github.actor }}",
              "author_icon": "${{ github.event.sender.avatar_url }}",
              "fields": [
                {
                  "title": "体重",
                  "value": "${{ github.event.inputs.weight }}"
                },
                {
                  "title": "脂肪 (kg)",
                  "value": "${{ github.event.inputs.fat }}"
                }
              ]
            }
          ]
    - name: Post on pixela
      run: |
        date=`date '+%Y%m%d'`
        curl -X POST https://pixe.la/v1/users/yasuharu519/graphs/weight -H "X-USER-TOKEN:${{ secrets.PIXELA_TOKEN }}" -d "{\"date\":\"${date}\",\"quantity\":\"${{ github.event.inputs.weight }}\"}"
      env:
        TZ: Asia/Tokyo
